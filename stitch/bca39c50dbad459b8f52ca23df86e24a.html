<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Record Editor - RecoverGrid Atlas</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-on-surface": "#eff1f3",
                    "primary-container": "#2563eb",
                    "surface": "#f7f9fb",
                    "on-surface-variant": "#434655",
                    "surface-container-high": "#e6e8ea",
                    "outline": "#737686",
                    "surface-variant": "#e0e3e5",
                    "on-primary-container": "#eeefff",
                    "primary": "#004ac6",
                    "surface-container-highest": "#e0e3e5",
                    "surface-container": "#eceef0",
                    "surface-bright": "#f7f9fb",
                    "inverse-primary": "#b4c5ff",
                    "background": "#f7f9fb",
                    "tertiary-fixed-dim": "#ffb596",
                    "primary-fixed": "#dbe1ff",
                    "on-background": "#191c1e",
                    "secondary-fixed-dim": "#b7c8e1",
                    "on-secondary": "#ffffff",
                    "on-tertiary-fixed": "#360f00",
                    "outline-variant": "#c3c6d7",
                    "primary-fixed-dim": "#b4c5ff",
                    "on-tertiary-fixed-variant": "#7d2d00",
                    "on-primary-fixed-variant": "#003ea8",
                    "secondary": "#505f76",
                    "on-secondary-fixed": "#0b1c30",
                    "surface-dim": "#d8dadc",
                    "on-primary": "#ffffff",
                    "on-primary-fixed": "#00174b",
                    "tertiary-container": "#bc4800",
                    "error": "#ba1a1a",
                    "on-secondary-fixed-variant": "#38485d",
                    "on-surface": "#191c1e",
                    "on-tertiary-container": "#ffede6",
                    "secondary-fixed": "#d3e4fe",
                    "on-secondary-container": "#54647a",
                    "surface-tint": "#0053db",
                    "tertiary-fixed": "#ffdbcd",
                    "on-tertiary": "#ffffff",
                    "on-error": "#ffffff",
                    "secondary-container": "#d0e1fb",
                    "surface-container-low": "#f2f4f6",
                    "on-error-container": "#93000a",
                    "surface-container-lowest": "#ffffff",
                    "inverse-surface": "#2d3133",
                    "tertiary": "#943700",
                    "error-container": "#ffdad6"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "spacing": {
                    "unit": "4px",
                    "gutter": "12px",
                    "section-gap": "24px",
                    "container-padding": "16px",
                    "stack-compact": "4px",
                    "stack-default": "8px"
            },
            "fontFamily": {
                    "body-md": [
                            "Inter"
                    ],
                    "display-sm": [
                            "Inter"
                    ],
                    "label-xs": [
                            "JetBrains Mono"
                    ],
                    "label-md": [
                            "JetBrains Mono"
                    ],
                    "headline-sm": [
                            "Inter"
                    ],
                    "body-sm": [
                            "Inter"
                    ]
            },
            "fontSize": {
                    "body-md": [
                            "14px",
                            {
                                    "lineHeight": "20px",
                                    "fontWeight": "400"
                            }
                    ],
                    "display-sm": [
                            "24px",
                            {
                                    "lineHeight": "32px",
                                    "letterSpacing": "-0.02em",
                                    "fontWeight": "600"
                            }
                    ],
                    "label-xs": [
                            "10px",
                            {
                                    "lineHeight": "14px",
                                    "letterSpacing": "0.05em",
                                    "fontWeight": "500"
                            }
                    ],
                    "label-md": [
                            "12px",
                            {
                                    "lineHeight": "16px",
                                    "fontWeight": "500"
                            }
                    ],
                    "headline-sm": [
                            "18px",
                            {
                                    "lineHeight": "24px",
                                    "fontWeight": "600"
                            }
                    ],
                    "body-sm": [
                            "13px",
                            {
                                    "lineHeight": "18px",
                                    "fontWeight": "400"
                            }
                    ]
            }
        },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill-icon {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body-md text-body-md antialiased min-h-screen flex flex-col">
<!-- Unsaved State Banner -->
<div class="bg-surface-container-high border-b border-outline-variant px-container-padding py-2 flex items-center justify-center gap-2 text-on-surface-variant font-label-md text-label-md sticky top-0 z-40">
<span class="material-symbols-outlined text-[16px]">info</span>
<span>You have unsaved changes.</span>
</div>
<main class="flex-grow flex flex-col max-w-4xl w-full mx-auto p-section-gap pt-6 gap-6">
<!-- Breadcrumbs -->
<nav class="flex items-center gap-2 text-on-surface-variant font-label-md text-label-md">
<a class="hover:text-primary transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-[16px]">home</span>
                Atlas Ops
            </a>
<span class="material-symbols-outlined text-[16px]">chevron_right</span>
<a class="hover:text-primary transition-colors" href="#">Record Operations</a>
<span class="material-symbols-outlined text-[16px]">chevron_right</span>
<span class="text-on-surface">Edit Record #REC-8492</span>
</nav>
<!-- Header -->
<header class="flex items-start justify-between gap-4 border-b border-outline-variant pb-4">
<div>
<h1 class="font-display-sm text-display-sm text-on-surface mb-1">Edit Record #REC-8492</h1>
<p class="text-on-surface-variant">Update the details for the current recovery operation.</p>
</div>
<div class="flex items-center gap-3 shrink-0">
<button class="h-8 px-4 border border-outline text-on-surface rounded font-label-md text-label-md hover:bg-surface-container-high transition-colors flex items-center gap-2">
                    Cancel
                </button>
<button class="h-8 px-4 bg-primary text-on-primary rounded font-label-md text-label-md hover:bg-primary-container transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">save</span>
                    Save Record
                </button>
</div>
</header>
<!-- Form Editor -->
<form class="bg-surface-container-lowest border border-surface-variant rounded flex flex-col">
<div class="p-container-padding flex flex-col gap-section-gap">
<!-- Section 1: Basic Info -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="flex flex-col gap-1 md:col-span-2">
<label class="font-label-md text-label-md text-on-surface flex items-center gap-1" for="record_title">
                            Record Title <span class="text-error">*</span>
</label>
<input class="h-8 px-3 border border-error bg-error-container/10 text-on-surface rounded font-body-md text-body-md focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-shadow" id="record_title" placeholder="e.g. Database Sync Failure - Node A" type="text" value=""/>
<p class="font-body-sm text-body-sm text-error flex items-center gap-1 mt-1">
<span class="material-symbols-outlined text-[14px]">error</span>
                            Title is required
                        </p>
</div>
<div class="flex flex-col gap-1 md:col-span-2">
<label class="font-label-md text-label-md text-on-surface flex items-center gap-1" for="description">
                            Description
                        </label>
<textarea class="p-3 border border-outline-variant bg-surface text-on-surface rounded font-body-md text-body-md focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-shadow resize-y" id="description" placeholder="Provide a detailed summary of the incident..." rows="3"></textarea>
</div>
</div>
<hr class="border-outline-variant"/>
<!-- Section 2: Classification -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface flex items-center gap-1" for="incident_type">
                            Incident Type <span class="text-error">*</span>
</label>
<div class="relative">
<select class="w-full h-8 px-3 pr-8 border border-outline-variant bg-surface text-on-surface rounded font-body-md text-body-md focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-shadow appearance-none" id="incident_type">
<option disabled="" selected="" value="">Select type...</option>
<option value="hardware">Hardware Failure</option>
<option value="software">Software Exception</option>
<option value="network">Network Outage</option>
<option value="security">Security Breach</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-1.5 text-on-surface-variant pointer-events-none text-[20px]">arrow_drop_down</span>
</div>
</div>
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface flex items-center gap-1" for="supervisor">
                            Supervisor <span class="text-error">*</span>
</label>
<div class="relative">
<select class="w-full h-8 px-3 pr-8 border border-outline-variant bg-surface text-on-surface rounded font-body-md text-body-md focus:ring-1 focus:ring-primary focus:border-primary outline-none transition-shadow appearance-none" id="supervisor">
<option disabled="" selected="" value="">Assign supervisor...</option>
<option value="sys_admin_1">J. Doe (SysAdmin)</option>
<option value="net_eng_1">A. Smith (NetEng)</option>
<option value="sec_ops">T. Wong (SecOps)</option>
</select>
<span class="material-symbols-outlined absolute right-2 top-1.5 text-on-surface-variant pointer-events-none text-[20px]">arrow_drop_down</span>
</div>
</div>
<div class="flex flex-col gap-2 md:col-span-2">
<label class="font-label-md text-label-md text-on-surface flex items-center gap-1">
                            Severity Level <span class="text-error">*</span>
</label>
<div class="flex flex-wrap gap-4">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 text-primary focus:ring-primary border-outline-variant cursor-pointer" name="severity" type="radio" value="low"/>
<span class="text-on-surface-variant group-hover:text-on-surface transition-colors">Low (P4)</span>
</label>
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 text-primary focus:ring-primary border-outline-variant cursor-pointer" name="severity" type="radio" value="medium"/>
<span class="text-on-surface-variant group-hover:text-on-surface transition-colors">Medium (P3)</span>
</label>
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 text-primary focus:ring-primary border-outline-variant cursor-pointer" name="severity" type="radio" value="high"/>
<span class="text-on-surface-variant group-hover:text-on-surface transition-colors">High (P2)</span>
</label>
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 text-error focus:ring-error border-outline-variant cursor-pointer" name="severity" type="radio" value="critical"/>
<span class="text-error font-medium">Critical (P1)</span>
</label>
</div>
</div>
</div>
<hr class="border-outline-variant"/>
<!-- Section 3: Recovery Notes (Monospace/Log style) -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface flex items-center justify-between" for="recovery_notes">
<span>Recovery Notes</span>
<span class="text-on-surface-variant font-normal">Optional</span>
</label>
<div class="border border-outline-variant rounded flex flex-col overflow-hidden focus-within:border-primary focus-within:ring-1 focus-within:ring-primary transition-shadow">
<!-- Toolbar -->
<div class="bg-surface-container-low border-b border-outline-variant px-2 py-1 flex gap-1">
<button class="p-1 text-on-surface-variant hover:text-on-surface hover:bg-surface-variant rounded transition-colors" title="Bold" type="button">
<span class="material-symbols-outlined text-[18px]">format_bold</span>
</button>
<button class="p-1 text-on-surface-variant hover:text-on-surface hover:bg-surface-variant rounded transition-colors" title="Italic" type="button">
<span class="material-symbols-outlined text-[18px]">format_italic</span>
</button>
<div class="w-px bg-outline-variant my-1 mx-1"></div>
<button class="p-1 text-on-surface-variant hover:text-on-surface hover:bg-surface-variant rounded transition-colors" title="Code Block" type="button">
<span class="material-symbols-outlined text-[18px]">code</span>
</button>
<button class="p-1 text-on-surface-variant hover:text-on-surface hover:bg-surface-variant rounded transition-colors" title="Attach Log" type="button">
<span class="material-symbols-outlined text-[18px]">attach_file</span>
</button>
</div>
<textarea class="p-3 bg-surface text-on-surface font-label-md text-label-md outline-none resize-y border-none focus:ring-0" id="recovery_notes" placeholder="[TIMESTAMP] Initializing recovery sequence..." rows="6"></textarea>
</div>
</div>
</div>
<!-- Footer Actions (Mobile Sticky / Desktop Inline) -->
<div class="bg-surface-container-low border-t border-outline-variant p-container-padding flex justify-end gap-3 rounded-b mt-auto">
<button class="h-8 px-4 border border-outline text-on-surface rounded font-label-md text-label-md hover:bg-surface-container-high transition-colors" type="button">
                    Discard Changes
                </button>
<button class="h-8 px-4 bg-primary text-on-primary rounded font-label-md text-label-md hover:bg-primary-container transition-colors flex items-center gap-2" type="submit">
                    Save Record
                </button>
</div>
</form>
</main>
</body></html>
